name: CI

on:
  pull_request:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TRIVY_IMAGE: aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        env:
          JWT_SECRET: test-secret-at-least-32-characters
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Stylelint
        run: npm run stylelint
      - name: Build
        run: npm run build

  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t zhongmei-api:ci .
      - name: Trivy high and critical report
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$TRIVY_IMAGE" image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            zhongmei-api:ci
      - name: Trivy critical gate
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$TRIVY_IMAGE" image \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            zhongmei-api:ci
